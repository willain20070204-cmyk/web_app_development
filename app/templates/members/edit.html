{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">編輯會員：{{ member.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('members.edit', id=member.id) }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ member.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">電子郵件</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ member.email or '' }}">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">電話</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ member.phone or '' }}">
                    </div>
                    <div class="mb-4">
                        <label for="join_date" class="form-label">加入日期</label>
                        <input type="date" class="form-control" id="join_date" name="join_date" value="{{ member.join_date or '' }}">
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('members.index') }}" class="btn btn-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-primary">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>會員管理</h2>
    <a href="{{ url_for('members.add') }}" class="btn btn-primary">新增會員</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>電子郵件</th>
                    <th>電話</th>
                    <th>加入日期</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr>
                    <td>{{ member.id }}</td>
                    <td>{{ member.name }}</td>
                    <td>{{ member.email or '-' }}</td>
                    <td>{{ member.phone or '-' }}</td>
                    <td>{{ member.join_date or '-' }}</td>
                    <td>
                        <a href="{{ url_for('members.edit', id=member.id) }}" class="btn btn-sm btn-outline-primary">編輯</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="6" class="text-center text-muted">目前沒有會員資料</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">編輯書籍：{{ book.title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('books.edit', id=book.id) }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">書名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ book.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">作者 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="author" name="author" value="{{ book.author }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="isbn" class="form-label">ISBN</label>
                            <input type="text" class="form-control" id="isbn" name="isbn" value="{{ book.isbn or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">分類</label>
                            <input type="text" class="form-control" id="category" name="category" value="{{ book.category or '' }}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="stock" class="form-label">庫存數量 <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="stock" name="stock" value="{{ book.stock }}" min="0" required>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('books.index') }}" class="btn btn-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-primary">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h4 class="mb-0">新增會員</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('members.add') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">姓名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">電子郵件</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">電話</label>
                        <input type="text" class="form-control" id="phone" name="phone">
                    </div>
                    <div class="mb-4">
                        <label for="join_date" class="form-label">加入日期</label>
                        <input type="date" class="form-control" id="join_date" name="join_date">
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('members.index') }}" class="btn btn-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-primary">儲存新增</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
